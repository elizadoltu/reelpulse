name: CD Frontend

on:
  workflow_dispatch:  # manual trigger only — enable push to main once Firebase secrets are configured

env:
  NODE_VERSION: '20.x'

jobs:
  deploy:
    name: Build & Deploy → Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}

      - name: Print deployment URL
        run: |
          echo "::notice title=Deployed::Frontend live at https://${{ secrets.GCP_PROJECT_ID }}.web.app"
