name: CD Backend

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20.x'
  GCP_REGION: europe-west1
  ARTIFACT_REGISTRY: europe-west1-docker.pkg.dev
  HUSKY: '0'

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      service-a: ${{ steps.filter.outputs.service-a }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      cf-analytics: ${{ steps.filter.outputs.cf-analytics }}
      cf-review-analyzer: ${{ steps.filter.outputs.cf-review-analyzer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service-a:
              - 'service-a/**'
              - 'tsconfig.base.json'
              - 'package.json'
            notification-service:
              - 'notification-service/**'
              - 'proto/**'
              - 'tsconfig.base.json'
              - 'package.json'
            cf-analytics:
              - 'cf-analytics/**'
              - 'tsconfig.base.json'
              - 'package.json'
            cf-review-analyzer:
              - 'cf-review-analyzer/**'
              - 'tsconfig.base.json'
              - 'package.json'

  deploy-service-a:
    name: Deploy / service-a → Cloud Run
    needs: detect-changes
    if: needs.detect-changes.outputs.service-a == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/$GOOGLE_CLOUD_PROJECT/reelpulse/service-a:${{ github.sha }}"
          docker build -t "$IMAGE" -f service-a/Dockerfile .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy service-a \
            --image="${{ steps.build.outputs.image }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,APP_PORT=3001,GCP_PROJECT_ID=$GOOGLE_CLOUD_PROJECT,PUBSUB_PROJECT_ID=$GOOGLE_CLOUD_PROJECT,PUBSUB_TOPIC_MOVIE_EVENTS=movie-events,PUBSUB_TOPIC_REVIEW_SUBMITTED=review-submitted,MONGO_DB_NAME=reelpulse" \
            --set-secrets="MONGO_URL=MONGO_URL:latest,JWT_SECRET=JWT_SECRET:latest" \
            --port=3001 \
            --quiet || {
              echo "::error title=Deploy failed::service-a Cloud Run deployment failed"
              exit 1
            }

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe service-a --region="${{ env.GCP_REGION }}" --format='value(status.url)')
          echo "service-a deployed at: $URL"

  deploy-notification-service:
    name: Deploy / notification-service → Cloud Run
    needs: detect-changes
    if: needs.detect-changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/$GOOGLE_CLOUD_PROJECT/reelpulse/notification-service:${{ github.sha }}"
          docker build -t "$IMAGE" -f notification-service/Dockerfile .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notification-service \
            --image="${{ steps.build.outputs.image }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="GCP_PROJECT_ID=$GOOGLE_CLOUD_PROJECT" \
            --port=3002 \
            --quiet || {
              echo "::error title=Deploy failed::notification-service Cloud Run deployment failed"
              exit 1
            }

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe notification-service --region="${{ env.GCP_REGION }}" --format='value(status.url)')
          echo "notification-service deployed at: $URL"

  deploy-cf-analytics:
    name: Deploy / cf-analytics → Cloud Functions
    needs: detect-changes
    if: needs.detect-changes.outputs.cf-analytics == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install and build
        run: |
          npm ci --workspace=cf-analytics --ignore-scripts
          npm run build --workspace=cf-analytics

      - name: Deploy Cloud Function
        working-directory: cf-analytics
        run: |
          gcloud functions deploy analyticsprocessor \
            --gen2 \
            --runtime=nodejs20 \
            --region="${{ env.GCP_REGION }}" \
            --source=. \
            --entry-point=analyticsprocessor \
            --trigger-topic=movie-events \
            --allow-unauthenticated \
            --build-service-account="projects/$GOOGLE_CLOUD_PROJECT/serviceAccounts/cloudbuild@$GOOGLE_CLOUD_PROJECT.iam.gserviceaccount.com" \
            --set-env-vars="GCP_PROJECT_ID=$GOOGLE_CLOUD_PROJECT,BIGQUERY_DATASET=reelpulse,BIGQUERY_TABLE=movie_views" \
            --quiet || {
              echo "::error title=Deploy failed::cf-analytics Cloud Function deployment failed"
              exit 1
            }

  deploy-cf-review-analyzer:
    name: Deploy / cf-review-analyzer → Cloud Functions
    needs: detect-changes
    if: needs.detect-changes.outputs.cf-review-analyzer == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install and build
        run: |
          npm ci --workspace=cf-review-analyzer --ignore-scripts
          npm run build --workspace=cf-review-analyzer

      - name: Deploy Cloud Function
        working-directory: cf-review-analyzer
        run: |
          gcloud functions deploy reviewAnalyzer \
            --gen2 \
            --runtime=nodejs20 \
            --region="${{ env.GCP_REGION }}" \
            --source=. \
            --entry-point=reviewAnalyzer \
            --trigger-http \
            --allow-unauthenticated \
            --build-service-account="projects/$GOOGLE_CLOUD_PROJECT/serviceAccounts/cloudbuild@$GOOGLE_CLOUD_PROJECT.iam.gserviceaccount.com" \
            --set-env-vars="GCP_PROJECT_ID=$GOOGLE_CLOUD_PROJECT,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet || {
              echo "::error title=Deploy failed::cf-review-analyzer Cloud Function deployment failed"
              exit 1
            }
